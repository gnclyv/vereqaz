<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kitabxanam — Vərəq</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  /* Ümumi Layout Optimizasiyası */
  .topbar { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 20px 0 10px; 
    flex-wrap: wrap; 
  }
  .search-box { 
    flex: 1; 
    min-width: 200px; 
    position: relative; 
  }
  .search-box input {
    width: 100%; 
    padding: 12px 16px 12px 40px; 
    border-radius: 10px;
    background: rgba(0,0,0,0.28); 
    border: 1px solid var(--line); 
    color: var(--cream); 
    font-size: 14px;
    box-sizing: border-box;
  }
  .search-box input:focus { outline: none; border-color: var(--gold); }
  .search-box::before { 
    content: '🔍'; 
    position: absolute; 
    left: 14px; 
    top: 50%; 
    transform: translateY(-50%); 
    opacity: 0.6; 
    font-size: 13px; 
  }
  .cat-select { 
    padding: 12px 14px; 
    border-radius: 10px; 
    background: rgba(0,0,0,0.28); 
    border: 1px solid var(--line); 
    color: var(--cream); 
    font-size: 14px; 
    cursor: pointer;
    box-sizing: border-box;
  }
  
  .user-chip { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    padding: 4px 12px 4px 4px; 
    border-radius: 30px; 
    background: rgba(0,0,0,0.25); 
    border: 1px solid var(--line); 
    position: relative; 
    cursor: pointer;
  }
  .avatar { 
    width: 28px; 
    height: 28px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-weight: 700; 
    font-size: 12px; 
    color: #1a1408; 
  }
  .user-menu-btn { 
    background: none; 
    border: none; 
    color: var(--cream); 
    font-size: 12.5px; 
    font-weight: 600; 
    padding: 0;
    cursor: pointer;
  }
  .user-dropdown {
    position: absolute; 
    top: 45px; 
    right: 0; 
    width: 150px; 
    padding: 6px;
    display: none; 
    z-index: 50; 
    animation: fadeSlide .2s ease;
  }
  .user-dropdown.open { display: block; }
  .user-dropdown button { 
    width: 100%; 
    text-align: left; 
    padding: 8px 10px; 
    background: none; 
    border: none; 
    color: var(--cream); 
    border-radius: 6px; 
    font-size: 13px; 
  }
  .user-dropdown button:hover { background: rgba(242,233,216,0.06); }

  .hero-strip { padding: 10px 0 15px; }
  .hero-strip h1 { font-family: var(--serif); font-size: 28px; margin: 4px 0; }
  .hero-strip p { color: var(--cream-dim); margin: 0; font-size: 14px; }

  /* Grid və Kitab Kartları */
  .grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
    gap: 20px; 
    padding: 15px 0 60px; 
  }
  .book-card {
    position: relative; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid var(--line);
    background: var(--bg-panel); 
    opacity: 0; 
    transform: translateY(15px);
    animation: cardIn .5s ease forwards;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
  
  .cover {
    height: 200px; 
    display: flex; 
    align-items: flex-end; 
    padding: 14px; 
    position: relative; 
    overflow: hidden;
  }
  .cover img.book-cover-img {
    position: absolute; 
    inset: 0; 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    z-index: 1;
  }
  .cover::after { 
    content: ''; 
    position: absolute; 
    inset: 0; 
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8)); 
    z-index: 2; 
  }
  .cover .cat-tag {
    position: absolute; 
    top: 10px; 
    left: 10px; 
    font-size: 9.5px; 
    letter-spacing: 0.5px; 
    text-transform: uppercase;
    background: rgba(0,0,0,0.65); 
    padding: 4px 8px; 
    border-radius: 12px; 
    z-index: 3; 
    font-weight: 600;
    backdrop-filter: blur(4px); 
    border: 1px solid rgba(255,255,255,0.08);
  }
  .cover .glyph { 
    font-family: var(--serif); 
    font-size: 26px; 
    z-index: 3; 
    color: #fff; 
    font-weight: 600; 
    text-shadow: 0 2px 6px rgba(0,0,0,0.8); 
  }
  
  .card-body { 
    padding: 14px; 
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-body h3 { 
    font-family: var(--serif); 
    font-size: 15.5px; 
    margin: 0 0 4px; 
    line-height: 1.3; 
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-body .author { font-size: 12px; color: var(--cream-dim); margin-bottom: 8px; }
  .card-body .desc { 
    font-size: 12px; 
    color: var(--cream-dim); 
    line-height: 1.4; 
    margin-bottom: 12px; 
    opacity: 0.8;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  
  /* Düymələr */
  .card-actions { 
    display: flex; 
    gap: 6px; 
    margin-top: auto;
  }
  .icon-btn {
    flex: 1; 
    padding: 8px; 
    border-radius: 8px; 
    border: 1px solid var(--line); 
    background: rgba(255,255,255,0.03);
    color: var(--cream); 
    font-size: 12px; 
    font-weight: 600; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 4px;
    text-decoration: none;
    box-sizing: border-box;
  }
  .icon-btn:hover { background: rgba(201,162,39,0.15); }
  .icon-btn.del { flex: 0 0 auto; width: 34px; color: #e08a8a; }
  .icon-btn.del:hover { background: rgba(168,50,50,0.2); }
  .meta-row { 
    display: flex; 
    justify-content: space-between; 
    font-size: 10.5px; 
    color: var(--cream-dim); 
    padding: 0 14px 12px; 
    opacity: 0.7; 
  }

  /* Modal Dizaynı */
  .modal-overlay {
    position: fixed; 
    inset: 0; 
    background: rgba(0,0,0,0.65); 
    backdrop-filter: blur(6px);
    display: none; 
    align-items: center; 
    justify-content: center; 
    z-index: 100; 
    padding: 12px;
    box-sizing: border-box;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 440px; 
    max-width: 100%; 
    max-height: 90vh; 
    overflow-y: auto; 
    padding: 24px;
    box-sizing: border-box;
  }
  .modal-head h2 { font-family: var(--serif); font-size: 20px; margin: 0; }
  
  .drop-zone {
    border: 2px dashed var(--line); 
    border-radius: 10px; 
    padding: 16px 12px; 
    text-align: center;
    margin-bottom: 12px; 
    cursor: pointer;
  }
  .drop-zone .dz-ic { font-size: 22px; margin-bottom: 4px; }
  .drop-zone .dz-text { font-size: 12px; color: var(--cream-dim); }
  .drop-zone .dz-file { font-size: 11.5px; color: var(--gold-bright); font-weight: 600; margin-top: 4px; }

  /* SKELETON */
  .skeleton { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 15px 0; }
  .skel-card { height: 300px; border-radius: 12px; background: linear-gradient(90deg, var(--bg-panel) 25%, var(--bg-panel-2) 50%, var(--bg-panel) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* =======================================================
     MOBILE RESPONSIVE MEDIAS (Telefonlar üçün əsas tənzimləmələr)
     ======================================================= */
  @media (max-width: 600px) {
    .nav {
      padding: 10px 14px;
    }
    .brand { font-size: 18px; }
    .nav-right { gap: 8px; }
    .nav-right .btn-primary {
      padding: 8px 12px;
      font-size: 12px;
    }
    .user-chip {
      padding: 3px;
    }
    .user-chip .user-menu-btn { display: none; } /* Telefonda ad gizlənir, yalnız avatar qalır */

    .hero-strip h1 { font-size: 24px; }
    .hero-strip p { font-size: 13px; }

    /* Axtarış və Kateqoriyalar alt-alta düzülür */
    .topbar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 12px 0 8px;
    }
    .search-box { width: 100%; }
    .cat-select { width: 100%; }

    /* İki Sütunlu Kompakt Grid */
    .grid, .skeleton { 
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px; 
    }
    
    .book-card {
      border-radius: 10px;
    }
    .cover {
      height: 140px; /* Telefonda üz qabığı hündürlüyü kiçilir */
      padding: 10px;
    }
    .cover .glyph { font-size: 20px; }
    .cover .cat-tag {
      font-size: 8px;
      padding: 2px 6px;
      top: 6px;
      left: 6px;
    }

    .card-body {
      padding: 10px;
    }
    .card-body h3 {
      font-size: 13.5px;
      margin-bottom: 2px;
    }
    .card-body .author {
      font-size: 11px;
      margin-bottom: 6px;
    }
    .card-body .desc {
      display: none; /* Ekran sahəsinə qənaət üçün təsviri telefonda gizlədirik */
    }

    /* Telefonlarda "Oxu" və "Endir" alt-alta tam enli düzülür */
    .card-actions {
      flex-direction: column;
      gap: 5px;
    }
    .icon-btn {
      width: 100%;
      padding: 8px;
      font-size: 11.5px;
    }
    .icon-btn.del {
      margin-top: 4px;
      width: 100%; /* Sil düyməsi də altda tam enli olur */
    }
    
    .meta-row {
      padding: 0 10px 10px;
      font-size: 9px;
      flex-direction: column;
      gap: 2px;
    }

    /* Modal mobil uyğunluğu */
    .modal {
      padding: 18px;
    }
    .modal-head h2 {
      font-size: 18px;
    }
    .drop-zone {
      padding: 12px 8px;
    }
    .drop-zone .dz-text {
      font-size: 11px;
    }
  }

  /* Çox kiçik ekranlı telefonlar üçün (məs. iPhone SE) */
  @media (max-width: 360px) {
    .grid, .skeleton {
      grid-template-columns: 1fr; /* Tək sütun dizaynı */
    }
    .cover {
      height: 160px;
    }
  }
</style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <nav class="nav">
    <div class="brand"><span class="brand-mark">📖</span> Vərəq</div>
    <div class="nav-right">
      <button class="btn btn-primary" onclick="openModal()">＋ Kitab yüklə</button>
      <div class="user-chip" id="userChip" onclick="toggleUserMenu()">
        <div class="avatar" id="avatar">?</div>
        <button class="user-menu-btn" id="usernameLabel">...</button>
        <div class="panel user-dropdown" id="userDropdown">
          <button onclick="logout()">Çıxış et</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="hero-strip">
      <h1>Xoş gəldin, <span id="greetName">oxucu</span> 👋</h1>
      <p>Kitabxanadakı bütün kitablara bax, öz kitablarını əlavə et.</p>
    </div>

    <div class="topbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Kitab adı və ya müəllif...">
      </div>
      <select class="cat-select" id="categorySelect">
        <option>Hamısı</option>
        <option>Bədii ədəbiyyat</option>
        <option>Elmi</option>
        <option>Tarix</option>
        <option>Psixologiya</option>
        <option>Biznes</option>
        <option>Uşaq ədəbiyyatı</option>
        <option>Digər</option>
      </select>
    </div>

    <div id="skeletonGrid" class="skeleton">
      <div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div>
    </div>
    <div id="bookGrid" class="grid" style="display:none;"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="ic">📚</div>
      <h3>Hələ kitab yoxdur</h3>
      <p>İlk kitabı yükləyən sən ol!</p>
      <button class="btn btn-primary" onclick="openModal()">＋ Kitab yüklə</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="panel modal">
      <div class="modal-head">
        <h2>Yeni kitab yüklə</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="uploadForm">
        
        <div class="drop-zone" id="dropZone">
          <div class="dz-ic">📄</div>
          <div class="dz-text">PDF faylı seçin</div>
          <div class="dz-file" id="dzFile"></div>
          <input type="file" id="pdfInput" accept="application/pdf,.pdf" style="display:none;">
        </div>

        <div class="drop-zone" id="coverDropZone">
          <div class="dz-ic">🖼️</div>
          <div class="dz-text">Üz qabığı şəkli seçin (İstəyə bağlı)</div>
          <div class="dz-file" id="dzCoverFile"></div>
          <input type="file" id="coverInput" accept="image/*" style="display:none;">
        </div>

        <div class="field">
          <label>Kitabın adı</label>
          <input type="text" name="title" required id="titleInput">
        </div>
        <div class="field">
          <label>Müəllif</label>
          <input type="text" name="author" required id="authorInput">
        </div>
        <div class="field">
          <label>Kateqoriya</label>
          <select name="category" id="categoryInput">
            <option>Bədii ədəbiyyat</option>
            <option>Elmi</option>
            <option>Tarix</option>
            <option>Psixologiya</option>
            <option>Biznes</option>
            <option>Uşaq ədəbiyyatı</option>
            <option>Digər</option>
          </select>
        </div>
        <div class="field">
          <label>Qısa təsvir (istəyə bağlı)</label>
          <textarea name="description" id="descInput" placeholder="Kitab haqqında bir neçə cümlə..."></textarea>
        </div>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <button class="btn btn-primary full-btn" type="submit" id="uploadBtn">
          <span class="btn-label">Yüklə</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/library.js"></script>
</body>
</html>
